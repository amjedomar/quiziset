services:
  db:
    image: mysql:8.4.9
    environment:
      MYSQL_ROOT_PASSWORD: quiziset
      MYSQL_DATABASE: quiziset
      MYSQL_USER: quiziset
      MYSQL_PASSWORD: quiziset
    ports:
      - '3308:3306'
    volumes:
      - db_data:/var/lib/mysql

  backend:
    image: node:24.15.0
    working_dir: /app
    ports:
      - '4004:4004'
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    command: tail -f /dev/null

  frontend:
    image: node:24.15.0
    working_dir: /app
    ports:
      - '3003:3003'
    environment:
      DOCKER_BACKEND_CONTAINER_HOST: backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    # NODE_ENV is intentionally NOT set here (because it was causing the "next build" to fail)
    # Instead, Next.js will sets it internally ("next dev" -> development, "next build" -> production)
    # see https://nextjs.org/docs/messages/non-standard-node-env#possible-ways-to-fix-it
    command: tail -f /dev/null

volumes:
  backend_node_modules:
  frontend_node_modules:
  frontend_next_cache:
  db_data:
